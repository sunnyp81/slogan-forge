<html lang="en">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050608;
      --bg2:      #08090d;
      --bg3:      #0a0c12;
      --bg4:      #080a10;
      --bg5:      #060810;
      --border:   #12151c;
      --border2:  #10162a;
      --border3:  #1a2535;
      --border4:  #151a24;
      --text:     #b8c2d0;
      --bright:   #edf0f7;
      --light:    #e0e7f0;
      --dim:      #8090a4;
      --muted:    #6b7a8d;
      --dark:     #3b4558;
      --darker:   #2a3040;
      --darkest:  #1e2430;
      --blue:     #3b82f6;
      --blue-l:   #7dd3fc;
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --purple:   #8b5cf6;
      --purple-l: #c4b5fd;
      --slate:    #94a3b8;
      --mono:     'DM Mono','IBM Plex Mono',monospace;
      --sans:     'DM Sans',sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
    }

    /* ── HEADER ───────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 100;
      padding: 14px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; }
    .hdr-icon {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .brand-name {
      font-family: var(--sans); font-weight: 800; font-size: 15px;
      color: var(--bright); letter-spacing: -0.03em;
    }
    .brand-sub { font-size: 9px; color: var(--dark); letter-spacing: 0.04em; }

    .hdr-actions { display: flex; gap: 6px; align-items: center; }
    .export-btn {
      display: none; padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border3); background: #0c1018;
      font-size: 10px; font-family: var(--mono);
      cursor: pointer; font-weight: 500;
    }
    .export-btn.vis { display: block; }
    .export-btn:hover { background: #111827; }
    .export-btn.std { color: var(--blue-l); }
    .export-btn.mba { color: var(--purple-l); border-color: rgba(139,92,246,.4); }
    .export-btn.png { color: #4ade80; border-color: rgba(74,222,128,.4); }
    .export-btn:disabled { opacity: .5; cursor: wait; }

    /* ── MAIN ─────────────────────────────── */
    .main { max-width: 900px; margin: 0 auto; padding: 20px 18px 60px; }

    /* ── PACK SELECTOR ───────────────────── */
    .pack-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .pack-btn {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-family: var(--sans); font-weight: 600; font-size: 12px;
      border: 1px solid var(--border); background: var(--bg3); color: var(--dark);
      transition: all .15s;
    }
    .pack-btn.on {
      border-color: rgba(59,130,246,.2);
      background: rgba(59,130,246,.063);
      color: var(--blue-l);
    }

    /* ── MARKET INTEL ─────────────────────── */
    .market {
      background: var(--bg4); border: 1px solid var(--border2);
      border-radius: 8px; margin-bottom: 16px; overflow: hidden;
    }
    .market-hd {
      padding: 12px 16px; cursor: pointer;
      font-size: 11px; color: var(--blue); font-weight: 600; letter-spacing: .04em;
      display: flex; align-items: center; justify-content: space-between;
      user-select: none;
    }
    .market-hd::after { content: '▶'; font-size: 8px; transition: transform .2s; }
    .market.open .market-hd::after { transform: rotate(90deg); }
    .market-body {
      display: none; padding: 0 16px 14px;
      border-top: 1px solid var(--border2);
    }
    .market.open .market-body { display: block; }
    .market-body p {
      font-size: 12px; line-height: 1.6; color: var(--dim); margin: 8px 0 10px;
    }
    .market-gap {
      font-size: 11px; color: var(--green); margin: 0 0 10px;
      padding: 6px 10px; background: #060d07;
      border-radius: 4px; border: 1px solid #0f2a15;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag-lbl {
      font-size: 9px; color: var(--dark); text-transform: uppercase;
      letter-spacing: .04em; margin-bottom: 4px;
    }
    .etag {
      font-size: 10px; padding: 2px 8px;
      background: #0c1018; border: 1px solid var(--border3);
      border-radius: 4px; color: var(--blue-l);
    }
    .btag {
      font-size: 10px; padding: 2px 7px;
      background: var(--bg4); border: 1px solid var(--border);
      border-radius: 3px; color: var(--muted);
    }

    /* ── FILTER BAR ──────────────────────── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .fbtn {
      padding: 5px 12px; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      color: var(--dark); font-size: 11px; font-family: var(--mono);
      cursor: pointer; transition: all .15s;

      border-color: rgba(59,53,128,.2);

      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }

      width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0;
      border: 1px solid #1a1e28; background: transparent;
      color: #2a3040; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); transition: all .15s;

    .star-btn.on {
      border-color: var(--purple);
      background: rgba(139,92,246,.125);
      color: var(--purple-l);

    .stxt {
      font-size: 14px; font-weight: 700; color: var(--light);
      font-family: var(--sans); letter-spacing: -.01em;

    .smeta { font-size: 10px; color: var(--dark); margin-top: 1px; }
    .sbadges {
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;

    .prod-badge {
      font-size: 9px; padding: 2px 6px; border-radius: 3px;
      background: #0c1018; border: 1px solid var(--border); color: var(--dark);
    }
    .risk-badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px;

    .sexp {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .step-lbl {
      font-size: 9px; color: var(--blue); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 6px; font-weight: 600;
    }
    .reasoning {
      font-size: 11px; line-height: 1.6; color: var(--dim); margin: 0 0 8px;
    }
    .ip-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px; font-size: 10px; margin-bottom: 6px;
    }
    .ip-cell {
      padding: 6px 8px; background: var(--bg5); border-radius: 4px;
      border: 1px solid var(--border); text-align: center;
    }
    .ip-lbl { color: var(--dark); font-size: 9px; margin-bottom: 2px; }
    .ip-val { font-weight: 600; }
    .ip-meta { display: flex; gap: 12px; font-size: 10px; margin-bottom: 4px; flex-wrap: wrap; }
    .rec { font-size: 11px; font-weight: 600; margin-top: 4px; }

    /* ── VERIFY LINKS ────────────────────── */
    .vlinks {
      margin-top: 10px; padding: 10px 12px;
      background: var(--bg5); border-radius: 6px; border: 1px solid var(--border4);
    }
    .vlbl {
      font-size: 9px; color: var(--dark); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 8px; font-weight: 600;
    }
    .vgrid { display: flex; gap: 5px; flex-wrap: wrap; }
    .vlink {
      font-size: 10px; padding: 5px 12px; border-radius: 5px;
      background: #0c1018; border: 1px solid var(--border3);
      text-decoration: none; font-family: var(--mono);
      transition: background .2s;
    }
    .vlink:hover { background: #111827; }
    .vlink.b { color: var(--blue-l); }
    .vlink.p { color: var(--purple-l); }
    .vlink.s { color: var(--slate); }

      background: var(--bg4); border-radius: 8px;
      border: 1px solid var(--border2);
      font-size: 11px; color: var(--dark); line-height: 1.7;
    }
    .howto-title {
      color: var(--blue-l); font-weight: 600;
      font-family: var(--sans); margin-bottom: 4px;
    }
    .howto-note { margin-top: 6px; color: var(--darker); font-size: 10px; }

    /* ── FOOTER ──────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px; text-align: center;
      font-size: 11px; color: var(--dark);
      background: var(--bg2);
    }
    .footer a { color: var(--blue-l); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── EMPTY STATE ─────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--darkest); }

    /* ── MOBILE ──────────────────────────── */
    @media (max-width: 640px) {
      .hdr { padding: 12px 14px; }
      .main { padding: 14px 12px 60px; }
      .ip-grid { grid-template-columns: 1fr 1fr; }
      .stxt { font-size: 13px; }
      .prod-badge { display: none; }
      .risk-badge { font-size: 9px; padding: 3px 8px; }
    }
    @media (max-width: 380px) {
      .brand-sub { display: none; }
      .stxt { font-size: 12px; }
    }
  </style>
</head>

// ── Helpers ────────────────────────────────────────────────────────────
function h(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function verifyLinks(text) {
  const q = encodeURIComponent(text);
  const qt = encodeURIComponent(text + ' t-shirt');
  const qs = encodeURIComponent(text + ' shirt');
  const qg = encodeURIComponent('"' + text + '" trademark OR brand OR lyrics');
  return [
    { label:'USPTO',     cls:'b', url:`https://tmsearch.uspto.gov/bin/gate.exe?f=searchss&p_lang=english&p_d=trmk&p_s_PARA1=${q}&a_default=search&a_search=Submit+Query` },
    { label:'UK IPO',    cls:'b', url:`https://trademarks.ipo.gov.uk/ipo-tmtext/page/Results?text=${q}&inarticle=true` },
    { label:'EUIPO',     cls:'b', url:`https://euipo.europa.eu/eSearch/#basic/${q}` },
    { label:'Amazon UK', cls:'p', url:`https://www.amazon.co.uk/s?k=${qt}` },
    { label:'Amazon US', cls:'p', url:`https://www.amazon.com/s?k=${qt}` },
    { label:'Etsy',      cls:'p', url:`https://www.etsy.com/search?q=${qs}` },
    { label:'Google',    cls:'s', url:`https://www.google.com/search?q=${qg}` },
  ];
}

// ── Actions (short names for inline onclick) ───────────────────────────
function _sp(id) { S.pack = id; S.expanded = null; S.filter = 'all'; S.mktOpen = false; render(); }
function _mkt()  { S.mktOpen = !S.mktOpen; render(); }
function _sf(f)  { S.filter = f; render(); }
function _te(i)  { S.expanded = S.expanded === i ? null : i; render(); }
function _ts(i)  { S.saved.has(i) ? S.saved.delete(i) : S.saved.add(i); render(); }

function _exp() {
  const pack = NICHE_PACKS.find(p => p.id === S.pack);
  if (!pack) return;
  const items = pack.slogans.filter((_, i) => S.saved.has(i));
  if (!items.length) return;
  const H = ['Slogan','Risk','Emotion','Audience','Products','Saturation','Recommendation'];
  const rows = items.map(s => [
    s.text, s.risk, s.emotion, s.audience,
    (s.products||[]).join('/'), s.saturation, s.recommendation,
  ].map(v => '"' + String(v).replace(/"/g, '""') + '"'));
  const csv = [H.join(','), ...rows.map(r => r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `slogans-${pack.id}-${Date.now()}.csv`;
  a.click();
}

// ── MBA copy generator ─────────────────────────────────────────────────
function _mbaCopy(s) {
  // Title: max 60 chars. Format: "[Slogan]" — Funny [Audience] Gift
  const titleLong = `"${s.text}" — Funny ${s.audience} Gift`;
  const title = titleLong.length <= 60 ? titleLong : `"${s.text}"`.substring(0, 57) + '...';

  // Brand: consistent across all listings
  const brand = 'Merch Observer';

  // Bullet 1: design/message description (~256 chars)
  const prods = (s.products||['t-shirt']).map(p => p === 'tee' ? 't-shirt' : p).join(', ');
  const b1raw = `${s.text} — a ${s.emotion} design for ${s.audience}. ${s.inspired_by}. Printed on a soft, lightweight ${prods}. Perfect for anyone who loves a bit of ${s.emotion}.`;
  const bullet1 = b1raw.substring(0, 256);

  // Bullet 2: gift occasion + product quality (~256 chars)
  const b2raw = `Makes a brilliant gift for ${s.audience} — birthdays, Christmas, Secret Santa, or just because. Classic fit, double-needle sleeve and bottom hem. Available in multiple colours and sizes.`;
  const bullet2 = b2raw.substring(0, 256);

  return { title, brand, bullet1, bullet2 };
}

function _mba() {
  const pack = NICHE_PACKS.find(p => p.id === S.pack);
  if (!pack) return;
  const items = pack.slogans.filter((_, i) => S.saved.has(i));
  if (!items.length) return;
  const H = ['Title','Brand','Bullet1','Bullet2','Slogan','Risk','Audience','Saturation','Recommendation'];
  const rows = items.map(s => {
    const { title, brand, bullet1, bullet2 } = _mbaCopy(s);
    return [title, brand, bullet1, bullet2, s.text, s.risk, s.audience, s.saturation, s.recommendation]
      .map(v => '"' + String(v).replace(/"/g, '""') + '"');
  });
  const csv = [H.join(','), ...rows.map(r => r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `mba-${pack.id}-${Date.now()}.csv`;
  a.click();
}

// ── PNG export ─────────────────────────────────────────────────────────
function _loadJSZip() {
  return new Promise((res, rej) => {
    if (window.JSZip) { res(window.JSZip); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = () => res(window.JSZip);
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

function _wrapLines(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

async function _png(btn) {
  const pack = NICHE_PACKS.find(p => p.id === S.pack);
  if (!pack) return;
  const items = pack.slogans.filter((_, i) => S.saved.has(i));
  if (!items.length) return;

  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Loading…';

  try {
    const JSZip = await _loadJSZip();
    await document.fonts.ready;

    const zip  = new JSZip();
    const W    = 4500;
    const H    = 5400;
    const PAD  = 600;

    for (let idx = 0; idx < items.length; idx++) {
      const s = items[idx];
      btn.textContent = `${idx + 1}/${items.length}…`;

      const canvas = document.createElement('canvas');
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // ── Background ────────────────────────────────────────────────
      ctx.fillStyle = '#080810';
      ctx.fillRect(0, 0, W, H);

      // Top + bottom gradient bar
      const grad = ctx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0, '#3b82f6');
      grad.addColorStop(1, '#8b5cf6');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, 14);
      ctx.fillRect(0, H - 14, W, 14);

      // ── Auto-size text to fit ──────────────────────────────────────
      const upper   = s.text.toUpperCase();
      const maxW    = W - PAD * 2;
      let   fs      = s.text.length < 25 ? 420 : s.text.length < 40 ? 330 : s.text.length < 55 ? 260 : 200;
      let   lines, lineH;

      while (fs > 80) {
        ctx.font = `800 ${fs}px "DM Sans", "Arial Black", sans-serif`;
        lines  = _wrapLines(ctx, upper, maxW);
        lineH  = fs * 1.22;
        if (lines.length * lineH < H * 0.44) break;
        fs -= 20;
      }

      const totalH = lines.length * lineH;
      const midY   = H / 2;
      const startY = midY - totalH / 2 + lineH / 2;

      // ── Accent rules ──────────────────────────────────────────────
      ctx.strokeStyle = 'rgba(99,102,241,0.5)';
      ctx.lineWidth   = 8;
      const ruleTop = startY - lineH * 0.9 - 70;
      const ruleBtm = startY + totalH - lineH * 0.1 + 70;
      ctx.beginPath(); ctx.moveTo(PAD, ruleTop); ctx.lineTo(W - PAD, ruleTop); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(PAD, ruleBtm); ctx.lineTo(W - PAD, ruleBtm); ctx.stroke();

      // Small dots on rule ends
      ctx.fillStyle = '#6366f1';
      [[PAD, ruleTop],[W-PAD, ruleTop],[PAD, ruleBtm],[W-PAD, ruleBtm]].forEach(([x,y]) => {
        ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI * 2); ctx.fill();
      });

      // ── Slogan text ───────────────────────────────────────────────
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `800 ${fs}px "DM Sans", "Arial Black", sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      lines.forEach((l, i) => ctx.fillText(l, W / 2, startY + i * lineH));

      // ── Niche label (small, above rule) ──────────────────────────
      ctx.fillStyle = 'rgba(99,102,241,0.7)';
      ctx.font      = `500 70px "DM Mono", "Courier New", monospace`;
      ctx.fillText(pack.name.toUpperCase(), W / 2, ruleTop - 80);

      // ── Risk badge (small, below rule) ────────────────────────────
      const rcMap = { low: '#22c55e', medium: '#eab308', high: '#ef4444' };
      const rlMap = { low: '✓ IP CLEAR', medium: '⚠ VERIFY FIRST', high: '✕ HIGH RISK' };
      ctx.fillStyle = rcMap[s.risk] || '#94a3b8';
      ctx.font      = `500 65px "DM Mono", "Courier New", monospace`;
      ctx.fillText(rlMap[s.risk] || '', W / 2, ruleBtm + 80);

      // ── Watermark ────────────────────────────────────────────────
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font      = `400 72px "DM Mono", "Courier New", monospace`;
      ctx.fillText('merch.observer', W / 2, H - 160);

      // ── Write to zip ─────────────────────────────────────────────
      const blob  = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const fname = s.text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '.png';
      zip.file(fname, blob);
    }

    btn.textContent = 'Zipping…';
    const content = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(content);
    a.download = `designs-${pack.id}-${Date.now()}.zip`;
    a.click();

  } catch (e) {
    alert('PNG export failed: ' + e.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = orig;
  }
}

// ── Boot ───────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
